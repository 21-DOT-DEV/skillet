# Free CI — the model-free merge gate (constitution V: "CI in this repo *is* the Linux user").
#
# Both jobs run the full unit + integration suite with ZERO secrets and ZERO paid model
# calls: the one paid test (the live smoke) is opt-in env-gated (SKILLET_LIVE_SMOKE) and
# self-skips here — the same pattern lm-evaluation-harness and Inspect AI use for their
# PR gates (evidence: Roadmap/phase-1-review.md §8, M1). Never add a provider credential
# to this workflow; paid validation stays a local, consented, env-gated run.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Swift 6.3)
    runs-on: macos-26
    permissions:
      contents: read
    env:
      # Pinned Xcode (the swift-bitcoinkernel convention) — but the PIN TARGET is a Swift
      # version, not an Xcode: swift-yaml's CxxStdlib conversions (std.string → Swift.String)
      # require Darwin Swift ≥ 6.3.2. Verified against xcodereleases.com build data:
      # Xcode 26.4.1 = Swift 6.3.1 → FAILS (run 28577148729); Xcode 26.5 = Swift 6.3.2 →
      # the exact toolchain proven locally (Xcode 27 beta ships the same 6.3.2 line);
      # Xcode 26.6 = Swift 6.3.3 (untested, likely fine). Keep ≥ 26.5 when bumping.
      DEVELOPER_DIR: "/Applications/Xcode_26.5.app/Contents/Developer"
    steps:
      - uses: actions/checkout@v6
      - name: Toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test (free suite — live smoke self-skips)
        run: swift test

  linux:
    name: Ubuntu (Swift 6.3)
    runs-on: ubuntu-latest
    container: swift:6.3 # official Swift image — deterministic toolchain, no third-party setup action
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test (free suite — live smoke self-skips)
        run: swift test
