# Free CI — the model-free merge gate (constitution V: "CI in this repo *is* the Linux user").
#
# Both jobs run the full unit + integration suite with ZERO secrets and ZERO paid model
# calls: the one paid test (the live smoke) is opt-in env-gated (SKILLET_LIVE_SMOKE) and
# self-skips here — the same pattern lm-evaluation-harness and Inspect AI use for their
# PR gates (evidence: Roadmap/phase-1-review.md §8, M1). Never add a provider credential
# to this workflow; paid validation stays a local, consented, env-gated run.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Swift 6.3)
    runs-on: macos-26
    permissions:
      contents: read
    env:
      # Pinned Xcode for determinism (the swift-bitcoinkernel convention). History, so nobody
      # re-litigates it: runs on 26.4.1 (Swift 6.3.1) AND 26.5 (Swift 6.3.2 — the same compiler
      # version as the local Xcode 27 beta) failed identically in swift-yaml, which proved the
      # cause was never a Swift-version floor: swift-yaml's std.string → String conversions
      # relied on the toolchain IMPLICITLY importing the CxxStdlib overlay (27 beta and Linux
      # do; Xcode 26.x does not). Fixed upstream with an explicit `import CxxStdlib` in
      # swift-yaml; skillet pins the fixed revision. Any Swift 6 Xcode works once repinned.
      DEVELOPER_DIR: "/Applications/Xcode_26.5.app/Contents/Developer"
    steps:
      - uses: actions/checkout@v6
      # TEMPORARY forensics, round 7 — remove when macOS is green. Round 6 proved the
      # runner's toolchain is complete (all Cxx artifacts present) and the bare
      # import-CxxStdlib probe PASSES there at clang's default C++ standard. Remaining
      # suspect: swift-yaml's cxxLanguageStandard .cxx11 — below the documented C++14
      # interop minimum (swift.org/documentation/cxx-interop/status). This matrix
      # discriminates it with a self-contained mini-package replicating swift-yaml's
      # shape (C++ target returning std::string → interop Swift target String(...)):
      # mini FAILS @cxx11 + PASSES @cxx17 → cause + fix confirmed on the runner itself,
      # and the mini is a standalone swiftlang bug-report repro. All four data points
      # print even on a red round (runs before the build).
      - name: CxxStdlib forensics matrix (temporary)
        run: |
          swift --version
          echo "--- [1] bare probe @ default std ---"
          printf 'import CxxStdlib\nlet s = std.string("probe-ok")\nprint(String(s))\n' > /tmp/probe.swift
          xcrun swiftc -cxx-interoperability-mode=default /tmp/probe.swift -o /tmp/probe && /tmp/probe || echo "RESULT[bare-default]: FAILED"
          echo "--- [2] bare probe @ -std=c++11 ---"
          xcrun swiftc -cxx-interoperability-mode=default -Xcc -std=c++11 /tmp/probe.swift -o /tmp/probe2 && /tmp/probe2 || echo "RESULT[bare-c++11]: FAILED"
          mkdir -p /tmp/mini/Sources/shim/include /tmp/mini/Sources/app
          cat > /tmp/mini/Package.swift <<'PKG'
          // swift-tools-version: 6.1
          import PackageDescription
          let package = Package(
              name: "mini",
              platforms: [.macOS(.v14)],
              targets: [
                  .target(name: "shim"),
                  .executableTarget(name: "app", dependencies: ["shim"],
                      swiftSettings: [.interoperabilityMode(.Cxx)])
              ],
              cxxLanguageStandard: .cxx11
          )
          PKG
          printf '#pragma once\n#include <string>\nstd::string greet();\n' > /tmp/mini/Sources/shim/include/shim.h
          printf '#include "shim.h"\nstd::string greet() { return std::string("mini-ok"); }\n' > /tmp/mini/Sources/shim/shim.cpp
          printf 'import shim\nimport CxxStdlib\nprint(String(greet()))\n' > /tmp/mini/Sources/app/main.swift
          for STD in cxx11 cxx17; do
            echo "--- [mini] cxxLanguageStandard .$STD ---"
            sed -i '' "s/\.cxx[0-9]*/.$STD/" /tmp/mini/Package.swift
            rm -rf /tmp/mini/.build
            (cd /tmp/mini && swift run) || echo "RESULT[mini-$STD]: FAILED"
          done
      - name: Build
        run: swift build
      - name: Test (free suite — live smoke self-skips)
        run: swift test

  linux:
    name: Ubuntu (Swift 6.3)
    runs-on: ubuntu-latest
    container: swift:6.3 # official Swift image — deterministic toolchain, no third-party setup action
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test (free suite — live smoke self-skips)
        run: swift test
