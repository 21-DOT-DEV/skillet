# Free CI — the model-free merge gate (constitution V: "CI in this repo *is* the Linux user").
#
# Both jobs run the full unit + integration suite with ZERO secrets and ZERO paid model
# calls: the one paid test (the live smoke) is opt-in env-gated (SKILLET_LIVE_SMOKE) and
# self-skips here — the same pattern lm-evaluation-harness and Inspect AI use for their
# PR gates (evidence: Roadmap/phase-1-review.md §8, M1). Never add a provider credential
# to this workflow; paid validation stays a local, consented, env-gated run.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS (Swift 6.3)
    runs-on: macos-26
    permissions:
      contents: read
    env:
      # Pinned Xcode for determinism (the swift-bitcoinkernel convention). History, so nobody
      # re-litigates it: runs on 26.4.1 (Swift 6.3.1) AND 26.5 (Swift 6.3.2 — the same compiler
      # version as the local Xcode 27 beta) failed identically in swift-yaml, which proved the
      # cause was never a Swift-version floor: swift-yaml's std.string → String conversions
      # relied on the toolchain IMPLICITLY importing the CxxStdlib overlay (27 beta and Linux
      # do; Xcode 26.x does not). Fixed upstream with an explicit `import CxxStdlib` in
      # swift-yaml; skillet pins the fixed revision. Any Swift 6 Xcode works once repinned.
      DEVELOPER_DIR: "/Applications/Xcode_26.5.app/Contents/Developer"
    steps:
      - uses: actions/checkout@v6
      # TEMPORARY forensics — remove when macOS is green. Every code/flag variable is now
      # eliminated (round 5: identical compiler build, -target macosx14.0 via the platforms
      # stanza, import present, flag-identical invocation — still fails, while the same
      # inputs pass locally). The remaining suspect is the runner's DISK: image bakers strip
      # Xcode contents, and a missing/stripped CxxStdlib.swiftmodule explains everything.
      # Local control (Xcode 26.5, 17F42): all artifacts present, probe prints "probe-ok".
      # Interpretation: probe FAILS + artifacts missing → stripped image (runner-images bug);
      # probe FAILS + artifacts present → toolchain breakage on the host (swiftlang bug);
      # probe PASSES → the failure is SwiftPM-build-specific, iterate on the probe.
      - name: CxxStdlib forensics (temporary)
        run: |
          swift --version
          xcrun --show-sdk-path
          TC="$DEVELOPER_DIR/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift"
          echo "--- toolchain swift/macosx Cxx artifacts ---"
          ls "$TC/macosx" | grep -i cxx || echo "!!! NO Cxx artifacts in toolchain"
          echo "--- CxxStdlib.swiftmodule contents ---"
          ls "$TC/macosx/CxxStdlib.swiftmodule" || echo "!!! CxxStdlib.swiftmodule MISSING"
          echo "--- minimal std.string probe (isolates swift-yaml entirely) ---"
          printf 'import CxxStdlib\nlet s = std.string("probe-ok")\nprint(String(s))\n' > /tmp/probe.swift
          xcrun swiftc -cxx-interoperability-mode=default /tmp/probe.swift -o /tmp/probe && /tmp/probe || echo "!!! PROBE FAILED"
      - name: Build
        run: swift build
      - name: Test (free suite — live smoke self-skips)
        run: swift test

  linux:
    name: Ubuntu (Swift 6.3)
    runs-on: ubuntu-latest
    container: swift:6.3 # official Swift image — deterministic toolchain, no third-party setup action
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Toolchain
        run: swift --version
      - name: Build
        run: swift build
      - name: Test (free suite — live smoke self-skips)
        run: swift test
